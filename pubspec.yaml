name: auragains
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  device_preview: ^1.3.1
  supabase_flutter: ^2.12.4
  provider: ^6.1.5+1
  image_picker: ^1.0.7
  video_player: ^2.8.1
  path: ^1.9.1
  cached_network_image: any
  intl: any
  go_router: ^7.0.0
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    image_path: "app_icon.png"
    icon_size: 48
  image_path: "app_icon.png"
  min_sdk_android: 21
